<style>
  body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  }

  /* 🌌 Animated background */
  .bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    animation: float 10s infinite ease-in-out;
  }

  .bubble:nth-child(1) {
    width: 200px; height: 200px;
    top: 10%; left: 10%;
  }

  .bubble:nth-child(2) {
    width: 150px; height: 150px;
    top: 60%; left: 70%;
  }

  .bubble:nth-child(3) {
    width: 100px; height: 100px;
    top: 40%; left: 40%;
  }

  @keyframes float {
    0% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-40px) scale(1.1); }
    100% { transform: translateY(0px) scale(1); }
  }

  h1 {
    text-align: center;
    color: #6b21a8;
    margin-top: 20px;
  }

  .card {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 20px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    transform: perspective(1000px) rotateX(2deg);
    transition: 0.3s;
  }

  .card:hover {
    transform: perspective(1000px) rotateX(0deg) scale(1.02);
  }

  video {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
  }

  button {
    padding: 12px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .start { background: #22c55e; color: white; }
  .flip { background: #3b82f6; color: white; }
  .voice { background: #6b7280; color: white; }

  #output {
    margin-top: 10px;
    font-size: 16px;
    color: #111;
  }
</style>
