<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SafeStep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      color: #6b21a8;
      margin-bottom: 5px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    video {
      width: 100%;
      border-radius: 15px;
    }

    button {
      padding: 12px 15px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    .start { background: #22c55e; color: white; }
    .flip { background: #3b82f6; color: white; }
    .voice { background: #6b7280; color: white; }

    #output {
      margin-top: 15px;
      font-size: 16px;
      color: #333;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
      color: red;
    }
  </style>
</head>

<body>

  <h1>SafeStep 🚶‍♂️</h1>
  <p>AI Navigation Assistant</p>

  <div class="card">
    <video id="video" autoplay playsinline></video>

    <div>
      <button class="start" onclick="startCamera()">Start Camera</button>
      <button class="flip" onclick="flipCamera()">Flip Camera</button>
      <button class="voice" onclick="toggleVoice()">Voice</button>
    </div>

    <div id="output">Status: Idle</div>
  </div>

  <!-- AI -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <script>
    let model;
    let video = document.getElementById("video");
    let currentFacing = "environment"; // back camera default
    let stream;

    let voiceEnabled = true;
    let lastSpoken = "";
    let lastTime = 0;

    function speak(text) {
      if (!voiceEnabled) return;
      const msg = new SpeechSynthesisUtterance(text);
      speechSynthesis.speak(msg);
    }

    async function startCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacing }
      });

      video.srcObject = stream;

      document.getElementById("output").innerText = "Camera Started";

      if (!model) {
        model = await cocoSsd.load();
        document.getElementById("output").innerText = "AI Model Loaded";
      }

      detect();
    }

    async function flipCamera() {
      currentFacing = currentFacing === "user" ? "environment" : "user";
      startCamera();
    }

    async function detect() {
      const predictions = await model.detect(video);

      if (predictions.length > 0) {
        const msg = predictions.map(p => p.class).join(", ");

        document.getElementById("output").innerText = "⚠️ " + msg;

        if (msg !== lastSpoken && Date.now() - lastTime > 2000) {
          speechSynthesis.cancel();
          speak(msg);
          lastSpoken = msg;
          lastTime = Date.now();
        }
      } else {
        document.getElementById("output").innerText = "✅ Safe";
      }

      requestAnimationFrame(detect);
    }

    function toggleVoice() {
      voiceEnabled = !voiceEnabled;
      document.getElementById("output").innerText =
        voiceEnabled ? "Voice ON" : "Voice OFF";
    }
  </script>

</body>
</html>
